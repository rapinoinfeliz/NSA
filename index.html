<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSA Pacing Calculator</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --lactate-color: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #58a6ff, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .copy-btn {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .copy-btn:active {
            transform: translateY(1px);
        }

        .input-section {
            background-color: #0d1117;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
        }

        select,
        input {
            width: 100%;
            padding: 10px;
            background-color: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        select:focus,
        input:focus {
            border-color: var(--accent-color);
        }

        .vdot-box {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(236, 72, 153, 0.08));
            border: 1px solid rgba(88, 166, 255, 0.2);
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 20px;
            padding-right: 20px;
        }

        .vdot-info {
            text-align: left;
        }

        .vdot-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vdot-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .vdot-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .card-header-note {
            font-size: 0.7rem;
            color: var(--lactate-color);
            text-transform: none;
            font-weight: 500;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed rgba(48, 54, 61, 0.3);
        }

        .data-row:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .data-label-group {
            display: flex;
            flex-direction: column;
        }

        .data-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .lactate-est {
            font-size: 0.75rem;
            color: var(--lactate-color);
            margin-top: 2px;
        }

        .data-value-group {
            text-align: right;
        }

        .data-value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .data-sub {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Distinct Tags */
        .tag {
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: 600;
            display: inline-block;
            vertical-align: middle;
            text-transform: uppercase;
        }

        /* 15KP = Gold/Orange */
        .tag-15kp {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        /* HMP = Blue */
        .tag-hmp {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* 30KP = Green */
        .tag-30kp {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* EZ = Purple */
        .tag-ez {
            background: rgba(163, 113, 247, 0.15);
            color: #a371f7;
            border: 1px solid rgba(163, 113, 247, 0.3);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>NSA Calculator</h1>
            </div>
            <button class="copy-btn" id="copy-btn" title="Copy results to clipboard">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                Copy
            </button>
        </div>

        <div class="input-section">
            <label>Time Trial Input</label>
            <div class="input-row">
                <div class="input-group" style="flex: 1.2;">
                    <select id="dist-preset">
                        <option value="custom">Custom</option>
                        <option value="3000">3000m</option>
                        <option value="5000">5K</option>
                        <option value="10000">10K</option>
                        <option value="21097">Half Mar.</option>
                        <option value="42195">Marathon</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 2;">
                    <input type="number" id="distance" value="2955" placeholder="Meters">
                </div>
                <div class="input-group" style="flex: 1.5;">
                    <input type="text" id="time" value="11:16" placeholder="MM:SS">
                </div>
            </div>

            <div style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 15px;">
                <label>Weather Conditions (Optional)</label>
                <div class="input-row">
                    <div class="input-group">
                        <input type="number" id="temp" placeholder="Temp (°C)" title="Temperature in Celsius">
                    </div>
                    <div class="input-group">
                        <input type="number" id="dew" placeholder="Dew Point (°C)" title="Dew Point in Celsius">
                    </div>
                </div>
                <div id="weather-impact"
                    style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 8px; font-style:italic;"></div>
            </div>
        </div>

        <div class="vdot-box">
            <div class="vdot-info">
                <div class="vdot-label">Estimated VDOT</div>
                <div class="vdot-sub">Based on 5k: <span id="pred-5k" style="color:#e6edf3;">--:--</span></div>
            </div>
            <div class="vdot-val" id="vdot-val">--</div>
        </div>

        <div class="card">
            <div class="card-title">
                Subthreshold
            </div>

            <div class="data-row">
                <div class="data-label-group">
                    <span class="data-label">3 min rep <span class="tag tag-15kp">15KP</span></span>
                </div>
                <div class="data-value-group">
                    <div class="data-value" id="pace-3min">--:--/km</div>
                    <div class="data-sub" id="dist-3min">-- m</div>
                </div>
            </div>

            <div class="data-row">
                <div class="data-label-group">
                    <span class="data-label">6 min rep <span class="tag tag-hmp">HMP</span></span>
                </div>
                <div class="data-value-group">
                    <div class="data-value" id="pace-6min">--:--/km</div>
                    <div class="data-sub" id="dist-6min">-- m</div>
                </div>
            </div>

            <div class="data-row">
                <div class="data-label-group">
                    <span class="data-label">10 min rep <span class="tag tag-30kp">30KP</span></span>

                </div>
                <div class="data-value-group">
                    <div class="data-value" id="pace-10min">--:--/km</div>
                    <div class="data-sub" id="dist-10min">-- m</div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-top: 16px;">
            <div class="card-title">
                Easy Run
            </div>
            <div class="data-row">
                <div class="data-label-group">
                    <span class="data-label">Easy Pace <span class="tag tag-ez">EZ</span></span>
                </div>
                <div class="data-value-group">
                    <div class="data-value" id="pace-easy">--:--/km</div>
                </div>
            </div>
        </div>
    </div>

                        else if (elDist.id.includes('6min')) duration = 360;
                        else if (elDist.id.includes('3min')) duration = 180;
                    }

                    let distHtml = "";
                    if (elDist) {
                        const normDist = Math.round((duration / paceSec) * 1000);
                        distHtml = normDist + " m";
                    }

                    // 2. Weather Adjustment
                    if (validWeather) {
                        const adjPaceSec = hapCalc.calculatePaceInHeat(paceSec, temp, dw);
                        // Show if impact > 1 sec/km
                        if (adjPaceSec > paceSec + 1) {
                            const adjPaceStr = formatTime(adjPaceSec);
                            // "Discreet" side display in lactate-color (pink)
                            paceHtml += ` <span style="color:var(--lactate-color); font-size:0.85em; margin-left:4px;">(${adjPaceStr})</span>`;

                            if (elDist) {
                                const adjDist = Math.round((duration / adjPaceSec) * 1000);
                                distHtml += ` <span style="color:var(--lactate-color); font-size:0.85em; margin-left:4px;">(${adjDist} m)</span>`;
                            }
                        }
                    }

                    elPace.innerHTML = paceHtml;
                    if (elDist) elDist.innerHTML = distHtml;
                };

                // 2. Calculate Paces
                // 30KP (10min)
                const p10 = 1.0552 * pred5kPace + 15.19;
                renderPace(p10, els.pace10, els.dist10);

                // HMP (6min)
                const p6 = 1.0256 * pred5kPace + 14.12;
                renderPace(p6, els.pace6, els.dist6);

                // 15KP (3min)
                const p3 = 1.0020 * pred5kPace + 13.20;
                renderPace(p3, els.pace3, els.dist3);

                // Easy Pace
                const pEasy = getEasyPace(pred5kSec);
                // Easy pace logic might differ? Just apply same adj?
                // HAP is usually for quality, but heat affects easy runs too.
                renderPace(pEasy, els.paceEasy, null);

                // Update Weather Impact Text
                if (validWeather) {
                    const adj = hapCalc.getAdjustment(temp, dw); // negative
                    // Impact % = (Neutral - Actual) / Actual ?? 
                    // Or % slow down.
                    // (Actual - Neutral) / Neutral.
                    // Actual = Exp(Log(N) + adj) ... wait.
                    // Let's just calculate for a reference pace (e.g. 5:00/km = 300s)
                    const ref = 300;
                    const res = hapCalc.calculatePaceInHeat(ref, temp, dw);
                    const pct = ((res - ref) / ref) * 100;
                    els.weatherImpact.textContent = `Heat Impact: ~${pct.toFixed(1)}% slowdown`;
                } else {
                    els.weatherImpact.textContent = "";
                }
            }

            function copyResults() {
                const inputTime = els.time.value;
                const inputDist = els.distance.value;
                const currentVDOT = els.vdot.textContent;

                // Strip HTML from text content for copy
                const getTxt = (el) => el.innerText.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

                const results = [
                    `NSA Pacing (TT: ${inputDist}m in ${inputTime})`,
                    `VDOT: ${currentVDOT}`,
                    ``,
                    `Sub-T Workouts:`,
                    `- 10min (30KP): ${getTxt(els.pace10)}`,
                    `- 6min (HMP): ${getTxt(els.pace6)}`,
                    `- 3min (15KP): ${getTxt(els.pace3)}`,
                    ``,
                    `Easy Pace: ${getTxt(els.paceEasy)}`
                ];

                if (els.temp.value) {
                    results.splice(2, 0, `Weather: ${els.temp.value}°C (Dew: ${els.dew.value || '-'}°C)`);
                }

                navigator.clipboard.writeText(results.join('\n')).then(() => {
                    const btn = document.getElementById('copy-btn');
                    const originalText = " Copy"; // btn.childNodes[2].textContent
                    // Simplification for reliability
                    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
                    setTimeout(() => {
                        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy`;
                    }, 1500);
                }).catch(err => console.error("Failed to copy", err));
            }

            // --- Event Listeners ---
            if (els.distPreset) {
                els.distPreset.addEventListener('change', () => {
                    const val = els.distPreset.value;
                    if (val !== 'custom') {
                        els.distance.value = val;
                        update();
                    }
                });
            }

            if (els.distance) {
                els.distance.addEventListener('input', () => {
                    const val = els.distance.value;
                    // Sync dropdown logic
                    let foundOptions = Array.from(els.distPreset.options).filter(o => o.value === val);
                    els.distPreset.value = foundOptions.length > 0 ? val : 'custom';
                    update();
                });
            }

            if (els.time) els.time.addEventListener('input', update);
            if (els.temp) els.temp.addEventListener('input', update);
            if (els.dew) els.dew.addEventListener('input', update); // Assuming dew element exists

            if (els.copyBtn) {
                els.copyBtn.addEventListener('click', copyResults);
            }

            // --- Auto-Fetch Weather for Florianópolis ---
            async function fetchWeather() {
                try {
                    // Florianópolis Coords: -27.5969, -48.5495
                    const lat = -27.5969;
                    const lon = -48.5495;
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,dew_point_2m`;

                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Weather API Error");
                    const data = await response.json();

                    if (data.current) {
                        els.temp.value = data.current.temperature_2m.toFixed(1);
                        els.dew.value = data.current.dew_point_2m.toFixed(1);
                        update();

                        // Add a small note about source
                        const note = document.createElement('div');
                        note.style.fontSize = "0.65rem";
                        note.style.color = "var(--text-secondary)";
                        note.style.marginTop = "4px";
                        note.style.textAlign = "right";
                        note.textContent = "Live data from Florianópolis (Open-Meteo)";
                        els.weatherImpact.parentNode.appendChild(note);
                    }
                } catch (e) {
                    console.warn("Could not fetch weather:", e);
                }
            }

            // Initialize
            fetchWeather(); // Try to fetch on load
            update();
        })();
    </script>
